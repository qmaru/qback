# Learn more: https://buf.build/docs/configuration/v2/buf-gen-yaml
version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: internal/pb

inputs:
  - directory: protos

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: .

  - remote: buf.build/grpc/go:v1.6.1
    out: .
